app = 'zoranstepanoski-prof-website'
primary_region = 'cdg'

[build]
dockerfile = "Dockerfile"

[[services]]
protocol = "tcp"
internal_port = 8080
processes = ["app"]

auto_stop_machines = true
auto_start_machines = true
min_machines_running = 1

[services.concurrency]
type = "connections"
hard_limit = 25
soft_limit = 20

[[services.ports]]
port = 80
handlers = ["http"]
force_https = true

[[services.ports]]
port = 443
handlers = ["tls", "http"]

[[services.http_checks]]
interval = "15s"
timeout = "5s"
grace_period = "90s"
method = "get"
path = "/management/health"
protocol = "http"

[[vm]]
memory = "2gb"
cpu_kind = "performance"
cpus = 1
