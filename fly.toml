app = 'zoranstepanoski-prof-website'
primary_region = 'cdg'

[build]

# This section replaces the old [http_service]
[[services]]
  protocol = "tcp"
  internal_port = 3000
  processes = ["app"]

  [services.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

# THIS IS THE NEW, CRITICAL HEALTH CHECK SECTION
  [[services.http_checks]]
    interval = "15s"      # Check every 15 seconds
    timeout = "5s"        # Give it 5 seconds to respond
    grace_period = "60s"  # IMPORTANT: Wait 60 seconds after start before the first check
    method = "get"
    path = "/management/health/liveness"
    protocol = "http"
    tls_skip_verify = true

[[vm]]
  memory = '2gb'
  cpu_kind = 'performance'
  cpus = 2
