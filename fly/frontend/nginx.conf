# In fly/frontend/nginx.conf (Corrected for .flycast)

server {
    listen 8080;
    server_name localhost;
    root /usr/share/nginx/html;

    # Gzip Settings for performance
    gzip on;
    gzip_disable "msie6";
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_min_length 256;
    gzip_types
        application/atom+xml
        application/geo+json
        application/javascript
        application/x-javascript
        application/json
        application/ld+json
        application/manifest+json
        application/rdf+xml
        application/rss+xml
        application/xhtml+xml
        application/xml
        font/eot
        font/otf
        font/ttf
        image/svg+xml
        text/css
        text/javascript
        text/plain
        text/xml;

    # API Reverse Proxy
    location ~ ^/(api|management|v3/api-docs)/ {
        # THIS IS THE CRITICAL CHANGE:
        # Use the .flycast address for secure, load-balanced private networking.
        proxy_pass http://zoranstepanoski-prof-api.flycast:8080;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA Fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
