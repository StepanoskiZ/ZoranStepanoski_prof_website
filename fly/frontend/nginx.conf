# In fly/frontend/nginx.conf (Final Version with Dynamic Resolver)

server {
    listen 8080;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip Settings
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # API Reverse Proxy
    location ~ ^/(api|management|v3/api-docs)/ {
        # THIS IS THE CRITICAL FIX:
        # Tell Nginx to use Fly.io's internal DNS resolver.
        # This allows it to find the .flycast address dynamically.
        resolver [fdaa::3]:53;

        # Use a variable for the upstream to force dynamic resolution
        set $backend "zoranstepanoski-prof-api.flycast";
        proxy_pass http://$backend:8080;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA Fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
