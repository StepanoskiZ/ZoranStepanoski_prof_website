# In fly/frontend/nginx.conf (Final, Polished Version)

server {
    listen 8080;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip Settings
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # API Reverse Proxy
    location ~ ^/(api|management|v3/api-docs)/ {
        # 1. Use Fly.io's internal DNS resolver.
        # 2. Use ipv6=on because the network is IPv6.
        # 3. Cache the result for 5s for performance.
        resolver [fdaa::3]:53 ipv6=on valid=5s;

        # 4. Use a variable to force dynamic resolution.
        set $backend_host "zoranstepanoski-prof-api.flycast";
        proxy_pass http://$backend_host:8080;

        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA Fallback for Angular routing
    location / {
        try_files $uri $uri/ /index.html;
    }
}
