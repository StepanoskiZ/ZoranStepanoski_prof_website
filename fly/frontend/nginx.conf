# fly/frontend/nginx.conf (Corrected with Reverse Proxy)

server {
  listen 8080;
  server_name localhost;

  root /usr/share/nginx/html;
  index index.html index.htm;

  # =================================================================
  # REVERSE PROXY FOR API CALLS
  # =================================================================
  # Any request that starts with /api/ will be forwarded to the
  # private backend application.
  location /api/ {
    proxy_connect_timeout 95s;
    proxy_send_timeout   95s;
    proxy_read_timeout   95s;

    proxy_pass http://zoranstepanoski-prof-api.internal:8080;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # =================================================================
  # SERVING THE ANGULAR APP
  # =================================================================
  # Any other request will be treated as a request for a frontend asset.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Optional: Add gzip compression for better performance
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_types text/plain text/css application/json application/javascript application/x-javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
}
