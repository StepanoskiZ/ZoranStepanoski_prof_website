# In fly/frontend/nginx.conf (Simplified & Corrected)

server {
    listen 8080;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip Settings
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # API Reverse Proxy
    location ~ ^/(api|management|v3/api-docs)/ {
        # Set a resolver. This is crucial for resolving .flycast addresses.
        # 127.0.0.1 is not correct here; we need Fly's internal DNS.
        resolver [fdaa::3]:53;

        proxy_pass http://zoranstepanoski-prof-api.flycast:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA Fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
