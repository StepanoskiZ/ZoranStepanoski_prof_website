# In fly/frontend/nginx.conf

server {
    listen 8080;
    server_name localhost;
    root /usr/share/nginx/html;

    # Gzip Settings for performance
    gzip on;
    gzip_disable "msie6";
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_min_length 256;
    gzip_types
        application/atom+xml
        application/geo+json
        application/javascript
        application/x-javascript
        application/json
        application/ld+json
        application/manifest+json
        application/rdf+xml
        application/rss+xml
        application/xhtml+xml
        application/xml
        font/eot
        font/otf
        font/ttf
        image/svg+xml
        text/css
        text/javascript
        text/plain
        text/xml;

    # This is the key part: API Reverse Proxy
    # Forward all requests for /api/ and /management/ to the backend service.
    location ~ ^/(api|management|v3/api-docs)/ {
        # The backend app is named 'zoranstepanoski-prof-api'
        # Fly.io provides a private DNS name for it.
        # The backend is listening on port 8080.
        proxy_pass http://zoranstepanoski-prof-api.internal:8080;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # This handles all other requests, serving the Angular app.
    # It's the standard "SPA fallback" configuration.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
