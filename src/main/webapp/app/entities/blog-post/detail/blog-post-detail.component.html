<div class="d-flex justify-content-center">
  <div class="col-8">
    @if (blogPost(); as blogPostRef) {
      <div>
        <h2 data-cy="blogPostDetailsHeading"><span jhiTranslate="zsWebsiteApp.blogPost.detail.title">Blog Post</span></h2>

        <hr />

        <jhi-alert-error />

        <jhi-alert />

        <dl class="row-md jh-entity-details">
          <dt><span jhiTranslate="global.field.id">ID</span></dt>
          <dd>
            <span>{{ blogPostRef.id }}</span>
          </dd>
          <dt><span jhiTranslate="zsWebsiteApp.blogPost.title">Title</span></dt>
          <dd>
            <span>{{ blogPostRef.title }}</span>
          </dd>
          <dt><span jhiTranslate="zsWebsiteApp.blogPost.content">Content</span></dt>
          <dd>
            <span>{{ blogPostRef.content }}</span>
          </dd>
          <dt><span jhiTranslate="zsWebsiteApp.blogPost.imageUrl">Image Url</span></dt>
          <dd>
            <span>{{ blogPostRef.imageUrl }}</span>
          </dd>
          <dt><span jhiTranslate="zsWebsiteApp.blogPost.publishedDate">Published Date</span></dt>
          <dd>
            <span>{{ blogPostRef.publishedDate | formatMediumDatetime }}</span>
          </dd>
        </dl>

        <button type="submit" (click)="previousState()" class="btn btn-info" data-cy="entityDetailsBackButton">
          <fa-icon icon="arrow-left"></fa-icon>&nbsp;<span jhiTranslate="entity.action.back">Back</span>
        </button>

        <button type="button" [routerLink]="['/blog-post', blogPostRef.id, 'edit']" class="btn btn-primary">
          <fa-icon icon="pencil-alt"></fa-icon>&nbsp;<span jhiTranslate="entity.action.edit">Edit</span>
        </button>
      </div>
    }
  </div>
</div>
