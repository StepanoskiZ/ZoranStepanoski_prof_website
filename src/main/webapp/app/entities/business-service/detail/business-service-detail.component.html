<div class="d-flex justify-content-center">
  <div class="col-8">
    @if (businessService(); as businessServiceRef) {
      <div>
        <h2 data-cy="businessServiceDetailsHeading">
          <span jhiTranslate="zsWebsiteApp.businessService.detail.title">Business Service</span>
        </h2>

        <hr />

        <jhi-alert-error />

        <jhi-alert />

        <dl class="row-md jh-entity-details">
          <dt><span jhiTranslate="global.field.id">ID</span></dt>
          <dd>
            <span>{{ businessServiceRef.id }}</span>
          </dd>
          <dt><span jhiTranslate="zsWebsiteApp.businessService.title">Title</span></dt>
          <dd>
            <span>{{ businessServiceRef.title }}</span>
          </dd>
          <dt><span jhiTranslate="zsWebsiteApp.businessService.description">Description</span></dt>
          <dd>
            <span>{{ businessServiceRef.description }}</span>
          </dd>
          <dt><span jhiTranslate="zsWebsiteApp.businessService.icon">Icon</span></dt>
          <dd>
            <span>{{ businessServiceRef.icon }}</span>
          </dd>
        </dl>

        <button type="submit" (click)="previousState()" class="btn btn-info" data-cy="entityDetailsBackButton">
          <fa-icon icon="arrow-left"></fa-icon>&nbsp;<span jhiTranslate="entity.action.back">Back</span>
        </button>

        <button type="button" [routerLink]="['/business-service', businessServiceRef.id, 'edit']" class="btn btn-primary">
          <fa-icon icon="pencil-alt"></fa-icon>&nbsp;<span jhiTranslate="entity.action.edit">Edit</span>
        </button>
      </div>
    }
  </div>
</div>
