<div class="d-flex justify-content-center">
  <div class="col-8">
    @if (projectImage(); as projectImageRef) {
      <div>
        <h2 data-cy="projectImageDetailsHeading"><span jhiTranslate="zsWebsiteApp.projectImage.detail.title">Project Image</span></h2>

        <hr />

        <jhi-alert-error />

        <jhi-alert />

        <dl class="row-md jh-entity-details">
          <dt><span jhiTranslate="global.field.id">ID</span></dt>
          <dd>
            <span>{{ projectImageRef.id }}</span>
          </dd>
          <dt><span jhiTranslate="zsWebsiteApp.projectImage.imageUrl">Image Url</span></dt>
          <dd>
            <span>{{ projectImageRef.imageUrl }}</span>
          </dd>
          <dt><span jhiTranslate="zsWebsiteApp.projectImage.caption">Caption</span></dt>
          <dd>
            <span>{{ projectImageRef.caption }}</span>
          </dd>
          <dt><span jhiTranslate="zsWebsiteApp.projectImage.project">Project</span></dt>
          <dd>
            @if (projectImage()!.project) {
              <div>
                <a [routerLink]="['/project', projectImage()!.project?.id, 'view']">{{ projectImageRef.project?.id }}</a>
              </div>
            }
          </dd>
        </dl>

        <button type="submit" (click)="previousState()" class="btn btn-info" data-cy="entityDetailsBackButton">
          <fa-icon icon="arrow-left"></fa-icon>&nbsp;<span jhiTranslate="entity.action.back">Back</span>
        </button>

        <button type="button" [routerLink]="['/project-image', projectImageRef.id, 'edit']" class="btn btn-primary">
          <fa-icon icon="pencil-alt"></fa-icon>&nbsp;<span jhiTranslate="entity.action.edit">Edit</span>
        </button>
      </div>
    }
  </div>
</div>
