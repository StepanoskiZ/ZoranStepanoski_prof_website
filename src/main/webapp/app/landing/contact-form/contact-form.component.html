<div class="container my-5">
  <div class="row justify-content-center">
    <div class="col-lg-8">
      <h2 class="text-center mb-4">Contact Me</h2>
      <form name="editForm" [formGroup]="editForm" (ngSubmit)="submit()">
        <!-- Name Input -->
        <div class="form-group mb-3">
          <label for="field_visitorName">Name</label>
          <input type="text" class="form-control" id="field_visitorName" formControlName="visitorName" />
        </div>

        <!-- Email Input -->
        <div class="form-group mb-3">
          <label for="field_visitorEmail">Email</label>
          <input type="email" class="form-control" id="field_visitorEmail" formControlName="visitorEmail" />
        </div>

        <!-- Message Textarea -->
        <div class="form-group mb-3">
          <label for="field_message">Message</label>
          <textarea class="form-control" id="field_message" formControlName="message" rows="5"></textarea>
        </div>

        <!-- Submit Button -->
        <div class="text-center">
          <button type="submit" class="btn btn-primary btn-lg" [disabled]="isSubmitting">
            <span *ngIf="isSubmitting" class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>
            Send Message
          </button>
        </div>

        <!-- Success Message -->
        <div *ngIf="isSuccess" class="alert alert-success mt-4 text-center">Thank you! Your message has been sent.</div>

        <!-- Error Message -->
        <div *ngIf="isError" class="alert alert-danger mt-4 text-center">Oops! Something went wrong. Please try again later.</div>
      </form>
    </div>
  </div>
</div>
