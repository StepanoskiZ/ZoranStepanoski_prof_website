<!-- =================== Hero Section =================== -->
<section class="landing-hero" aos data-aos="fade-up">
  <div class="hero-content mt-5">
    <h1 jhiTranslate="landing.heroTitle"></h1>
    <p class="lead" jhiTranslate="landing.heroSubtitle"></p>
    <a routerLink="/projects" class="btn btn-primary btn-lg" jhiTranslate="landing.cta"></a>
  </div>
</section>

<!-- =================== Services Section =================== -->
<section class="services-section container my-5">
  <div class="service-card" *ngFor="let service of services" data-aos="fade-up" [attr.data-aos-delay]="service.delay">
    <img [src]="service.icon" [alt]="service.title" />
    <h3 [jhiTranslate]="service.title"></h3>
    <p [jhiTranslate]="service.description"></p>
  </div>
</section>

<!-- =================== About Section =================== -->
<section class="about-section container text-center my-5" aos data-aos="fade-up" data-aos-delay="400">
  <h2 jhiTranslate="landing.aboutTitle"></h2>
  <p jhiTranslate="landing.aboutDesc"></p>
</section>

<!-- =================== Contact CTA Section =================== -->
<section class="contact-section container text-center my-5" aos data-aos="fade-up" data-aos-delay="600">
  <h2 jhiTranslate="landing.contactTitle"></h2>
  <p jhiTranslate="landing.contactDesc"></p>
  <a routerLink="/contact" class="btn btn-primary btn-lg" jhiTranslate="landing.contactCTA"></a>
</section>
