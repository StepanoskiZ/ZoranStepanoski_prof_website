<section #section id="home" class="landing-hero">
  <div class="container">
    <div class="hero-content mt-5" data-aos="fade-up">
      <h1 jhiTranslate="landing.heroTitle"></h1>
      <h1 class="lead" jhiTranslate="landing.heroSubtitle"></h1>
      <a href="#contact" class="btn btn-primary btn-lg" jhiTranslate="landing.ctaContact"></a>
    </div>
  </div>
</section>
<!-- =================== About Section =================== -->
<section #section id="about" class="about-section py-5">
  <div class="container">
    <div class="row align-items-center">
      <!-- Text Content (Left Column) -->
      <div class="col-lg-7">
        <p class="sub-heading" jhiTranslate="landing.aboutSubheading"></p>
        <h2 class="fw-bold mb-3" jhiTranslate="landing.aboutHeading"></h2>
        <p class="lead" jhiTranslate="landing.aboutDesc"></p>

        <!-- Links Section -->
        <div>
          <a href="#contact" class="get-in-touch-link" jhiTranslate="landing.ctaContact"></a>
          <a [href]="cvDownloadLink" target="_blank" download class="get-in-touch-link ms-4">
            <i class="fas fa-download me-1"></i> <span jhiTranslate="landing.downloadCV">Download CV</span>
          </a>
        </div>
      </div>
      <!-- Your Picture (Right Column) -->
      <div class="col-lg-5">
        <img src="content/images/profile-picture.jpg" alt="Zoran Stepanoski" class="profile-picture img-fluid rounded shadow-lg" />
      </div>
    </div>
  </div>
</section>

<!-- =================== Services Section =================== -->
<section #section id="services" class="services-section bg-light py-5">
  <div class="container">
    <!-- Main Headings -->
    <div class="mb-5">
      <p class="sub-heading" jhiTranslate="landing.servicesSubheading"></p>
      <h2 class="fw-bold" jhiTranslate="landing.servicesHeading"></h2>
    </div>

    <!-- Service Cards Grid -->
    <div class="row">
      <div class="col-lg-4 mb-4" *ngFor="let service of services" data-aos="fade-up" [attr.data-aos-delay]="service.delay">
        <div class="service-card">
          <img [src]="service.icon" class="card-img-top" [alt]="service.title | translate" />
          <div class="card-body">
            <h3 class="card-title">{{ service.title | translate }} ></h3>
            <p class="card-text">{{ service.description | translate }}</p>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>

<!-- =================== Projects Section =================== -->
<section #section id="projects" class="container my-5 text-center">
  <h2 class="mb-4" jhiTranslate="landing.navProject"></h2>
  <p>This is where your portfolio of projects will be displayed. You can fetch them from the backend.</p>
  <!-- You would add an *ngFor loop here to show your projects -->
</section>

<!-- =================== Gallery Section =================== -->
<section #section id="gallery" class="bg-light py-5">
  <div class="container text-center">
    <h2 class="mb-4" jhiTranslate="landing.navGallery"></h2>
    <p>This is where your image gallery will be displayed. You can fetch images from the backend.</p>
    <!-- You would add an *ngFor loop here to show your project images -->
  </div>
</section>

<!-- =================== Contact Section =================== -->
<section #section id="contact" class="contact-section-wrapper" data-aos="fade-up">
  <jhi-contact-form></jhi-contact-form>
</section>
