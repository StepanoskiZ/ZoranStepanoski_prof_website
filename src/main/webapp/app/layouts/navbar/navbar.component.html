<!--nav data-cy="navbar" class="navbar navbar-dark navbar-expand-md bg-dark">

                <span jhiTranslate="global.menu.admin.health">Health</span>

            <li>
              <a class="dropdown-item" routerLink="/admin/logs" routerLinkActive="active" (click)="collapseNavbar()">

                <span jhiTranslate="global.menu.admin.logs">Logs</span>

            </li>

              <li>

            <a class="nav-link dropdown-toggle" ngbDropdownToggle href="javascript:void(0);" id="languagesnavBarDropdown">

              </span>

                  <a class="dropdown-item"
                     [jhiActiveMenu]="language"
                     href="javascript:void(0);"
                     (click)="changeLanguage(language); collapseNavbar()">

                  </a>

              }
            </ul>

                <span jhiTranslate="global.menu.account.main">Account</span>

              <span>

                   routerLink="/account/settings"
                   routerLinkActive="active"
                   (click)="collapseNavbar()"
                   data-cy="settings">
                  <fa-icon icon="wrench" [fixedWidth]="true"></fa-icon>
                  <span jhiTranslate="global.menu.account.settings">Settings</span>

                <a class="dropdown-item" (click)="logout()" id="logout" data-cy="logout">

              </li>
              <li>
                <a class="dropdown-item"
                   routerLink="/account/register"
                   routerLinkActive="active"
                   (click)="collapseNavbar()"
                   data-cy="register">
                  <fa-icon icon="user-plus" [fixedWidth]="true"></fa-icon>
                  <span jhiTranslate="global.menu.account.register">Register</span>
                </a>
              </li>
            }
          </ul>
        </li>
      </ul>
    </div>
  </div>
</nav-->

<!-- The main navbar element with Bootstrap classes for styling -->
<nav data-cy="navbar" class="navbar navbar-expand-lg navbar-light bg-white shadow-sm w-100 sticky-top">
  <div class="container">
    <!-- Your name as the brand/logo, linking to the home page -->
    <a class="navbar-brand logo" routerLink="/" (click)="collapseNavbar()">
      <span class="navbar-title fw-bold text-primary">Zoran Stepanoski</span>
      <!--span class="navbar-version">{{ version }}</span-->
    </a>

    <!-- The mobile "hamburger" menu button -->
    <button
      class="navbar-toggler"
      type="button"
      (click)="toggleNavbar()"
      aria-controls="navbarResponsive"
      aria-expanded="false"
      aria-label="Toggle navigation"
    >
      <fa-icon icon="bars"></fa-icon>
    </button>

    <!-- This is where all your menu links will go. It collapses on mobile. -->
    <div class="navbar-collapse collapse" id="navbarResponsive" [ngbCollapse]="isNavbarCollapsed()">
      <ul class="navbar-nav ms-auto">
        <!-- START: Your custom public menu items -->

        <li class="nav-item" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
          <a class="nav-link" routerLink="/" (click)="collapseNavbar()"><span jhiTranslate="global.menu.home"></span></a>
        </li>

        <li class="nav-item" routerLinkActive="active">
          <a class="nav-link" routerLink="/about" (click)="collapseNavbar()"><span jhiTranslate="global.menu.about"></span></a>
        </li>

        <li class="nav-item" routerLinkActive="active">
          <a class="nav-link" routerLink="/services" (click)="collapseNavbar()"><span jhiTranslate="global.menu.services"></span></a>
        </li>

        <li class="nav-item" routerLinkActive="active">
          <a class="nav-link" routerLink="/projects" (click)="collapseNavbar()"><span jhiTranslate="global.menu.projects"></span></a>
        </li>

        <li class="nav-item" routerLinkActive="active">
          <a class="nav-link" routerLink="/gallery" (click)="collapseNavbar()"><span jhiTranslate="global.menu.gallery"></span></a>
        </li>

        <li class="nav-item" routerLinkActive="active">
          <a class="nav-link" routerLink="/blog" (click)="collapseNavbar()"><span jhiTranslate="global.menu.blog"></span></a>
        </li>

        <li class="nav-item" routerLinkActive="active">
          <a class="nav-link" routerLink="/contact" (click)="collapseNavbar()"><span jhiTranslate="global.menu.contact"></span></a>
        </li>

        <!-- END: Your custom public menu items -->

        <!-- IMPORTANT: JHipster's Account Menu - Keep this! It handles login/logout. -->
        <li
          ngbDropdown
          class="nav-item dropdown pointer"
          display="dynamic"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: true }"
        >
          @let accountRef = account();
          <a class="nav-link dropdown-toggle" ngbDropdownToggle href="javascript:void(0);" id="account-menu" data-cy="accountMenu">
            <span>
              <fa-icon icon="user"></fa-icon>
            </span>
          </a>
          <ul class="dropdown-menu" ngbDropdownMenu aria-labelledby="account-menu">
            @if (accountRef !== null) {
              <!-- Show these links when the user is LOGGED IN -->
              <li>
                <a class="dropdown-item" routerLink="/admin/user-management" (click)="collapseNavbar()">
                  <fa-icon icon="users-cog" [fixedWidth]="true"></fa-icon>
                  <span>Admin Panel</span>
                </a>
              </li>
              <li>
                <a class="dropdown-item" (click)="logout()" id="logout" data-cy="logout">
                  <fa-icon icon="sign-out-alt" [fixedWidth]="true"></fa-icon>
                  <span jhiTranslate="global.menu.account.logout"></span>
                </a>
              </li>
            } @else {
              <!-- Show these links when the user is LOGGED OUT -->
              <li>
                <a class="dropdown-item" (click)="login()" id="login" data-cy="login">
                  <fa-icon icon="sign-in-alt" [fixedWidth]="true"></fa-icon>
                  <span jhiTranslate="global.menu.account.login"></span>
                </a>
              </li>
            }
          </ul>
        </li>
      </ul>
    </div>
  </div>
</nav>
