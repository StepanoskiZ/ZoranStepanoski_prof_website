<!-- =================== Navbar =================== -->
<nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm w-100 sticky-top" [ngClass]="{ scrolled: navbarScrolled }">
  <div class="container">
    <a class="navbar-brand fw-bold" href="#home">ZORAN STEPANOSKI</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav me-auto">
        <li class="nav-item">
          <a class="nav-link" href="#home" [class.active]="activeSection() === 'home'" jhiTranslate="landing.navHome"></a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#about" [class.active]="activeSection() === 'about'" jhiTranslate="landing.navAbout"></a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#services" [class.active]="activeSection() === 'services'" jhiTranslate="landing.navServices"></a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#projects" [class.active]="activeSection() === 'projects'" jhiTranslate="landing.navProject"></a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#gallery" [class.active]="activeSection() === 'gallery'" jhiTranslate="landing.navGallery"></a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#blog" [class.active]="activeSection() === 'blog'" jhiTranslate="landing.navBlog"></a>
        </li>
        <li class="nav-item btn-contact-nav">
          <a class="nav-link" href="#contact" jhiTranslate="landing.navContact"></a>
        </li>
      </ul>
      <ul class="navbar-nav">
        <li class="nav-item" ngbDropdown>
          <a class="nav-link dropdown-toggle" href="javascript:void(0);" id="navbarDropdownLanguage" ngbDropdownToggle>
            <span [class]="currentFlagClass"></span>
          </a>
          <ul class="dropdown-menu" ngbDropdownMenu aria-labelledby="navbarDropdownLanguage">
            <li>
              <a class="dropdown-item" href="javascript:void(0);" (click)="changeLanguage('en')"
                ><span class="fi fi-gb me-2"></span>English</a
              >
            </li>
            <li>
              <a class="dropdown-item" href="javascript:void(0);" (click)="changeLanguage('sr')"
                ><span class="fi fi-rs me-2"></span>Srpski</a
              >
            </li>
          </ul>
        </li>
      </ul>
    </div>
  </div>
</nav>
